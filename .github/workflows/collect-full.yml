name: Collect AutoHome (Full)

# 阶段 2：全量采集。
# 3891 个车系，每个约 7 秒（2 次请求 + 限速），总计约 7.5 小时。
# GitHub Actions 单 job 限 6 小时，用 4 路矩阵分片并行。
# 每个分片约 973 个车系，约 1.9 小时。
#
# 手动触发，支持断点续传。
on:
  workflow_dispatch:
    inputs:
      skip-stopped:
        description: '跳过停售车系'
        type: boolean
        required: false
        default: true
      shards:
        description: '分片数（默认 4）'
        required: false
        default: '4'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Run collector (shard ${{ matrix.shard }})
        run: |
          ARGS="--shard=${{ matrix.shard }}/${{ github.event.inputs.shards || '4' }}"
          if [ "${{ github.event.inputs.skip-stopped }}" = "true" ]; then
            ARGS="$ARGS --skip-stopped"
          fi
          echo "运行: pnpm collect $ARGS"
          pnpm collect $ARGS

      - name: Show summary
        if: always()
        run: |
          echo "=== 分片 ${{ matrix.shard }} 采集进度 ==="
          cat output/progress.json 2>/dev/null | python3 -m json.tool || echo "无 progress"
          echo ""
          echo "=== 输出文件 ==="
          ls -lh output/ 2>/dev/null
          echo ""
          echo "=== CSV 行数 ==="
          if [ -f output/car_models.csv ]; then
            wc -l output/car_models.csv
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: car-library-shard-${{ matrix.shard }}
          path: output/
          retention-days: 14
